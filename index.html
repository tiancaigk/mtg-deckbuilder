    // 显示版本选择器
    let currentSelectedCard = null;
    let currentSelectedArea = null;

    async function showVersionSelector(cardId, cardName, area) {
      currentSelectedCard = cardId;
      currentSelectedArea = area;
      
      // 检查 cardId 是否有效
      if (!cardId || cardId === 'undefined' || cardId === 'null') {
        showToast('卡牌 ID 无效，请重新添加此卡', 'error');
        return;
      }
      
      document.getElementById('versionModalTitle').textContent = `选择版本：${cardName}`;
      document.getElementById('versionModal').style.display = 'flex';
      document.getElementById('versionsGrid').innerHTML = '';
      document.getElementById('versionModalLoading').style.display = 'block';

      try {
        // 获取该卡牌的所有版本
        const response = await fetch(`https://api.scryfall.com/cards/${cardId}`, { signal: AbortSignal.timeout(10000) });
        const card = await response.json();

        if (card.object === 'error') {
          console.error('卡牌 API 错误:', card);
          document.getElementById('versionsGrid').innerHTML = `
            <div class="empty-state">
              <div class="empty-state-icon">❌</div>
              <div class="empty-state-text">卡牌数据无效：${card.details || '未知错误'}</div>
            </div>
          `;
        } else if (card.prints_search_uri) {
          // 获取所有版本
          const printsResponse = await fetch(card.prints_search_uri);
          const printsData = await printsResponse.json();
          displayVersions(printsData.data || []);
        } else {
          // 只有一个版本
          displayVersions([card]);
        }
      } catch (error) {
        console.error('获取版本失败:', error);
        document.getElementById('versionsGrid').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">❌</div>
            <div class="empty-state-text">加载失败，请重试<br><small>${error.message}</small></div>
          </div>
        `;
      }

      document.getElementById('versionModalLoading').style.display = 'none';
    }

    // 显示版本列表
    function displayVersions(versions) {
      const grid = document.getElementById('versionsGrid');
      
      if (versions.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <div class="empty-state-text">未找到其他版本</div>
          </div>
        `;
        return;
      }

      // 找到当前选中的版本
      const currentCard = deck[currentSelectedArea === 'main' ? 'main' : 'side']
        .find(c => c.id === currentSelectedCard);
      const currentIsFoil = currentCard?.foil || false;

      // 检查是否有 Foil 和 Non-foil 版本
      const hasFoil = versions.some(v => v.foil);
      const hasNonFoil = versions.some(v => v.nonfoil);

      // 获取当前版本的所有 printings
      const currentVersion = versions.find(v => v.id === currentSelectedCard) || versions[0];
      const foilPrice = parseFloat(currentVersion.prices?.usd_foil || '0') || 0;
      const nonFoilPrice = parseFloat(currentVersion.prices?.usd || '0') || 0;

      let foilOptions = '';
      if (hasFoil || hasNonFoil) {
        foilOptions = `
          <div class="foil-toggle">
            <div class="foil-option ${!currentIsFoil && hasNonFoil ? 'active' : ''} ${!hasNonFoil ? 'disabled' : ''}" 
                 onclick="${hasNonFoil ? `setFoil(false)` : ''}">
              <div class="foil-option-label">⚪ Non-foil</div>
              <div class="foil-option-price">${hasNonFoil ? (nonFoilPrice > 0 ? '$' + nonFoilPrice.toFixed(2) : '暂无价格') : '此版本无 Non-foil'}</div>
              ${!currentIsFoil && hasNonFoil ? '<div style="color: var(--secondary); font-size: 0.75rem; margin-top: 0.25rem;">✅ 当前</div>' : ''}
            </div>
            <div class="foil-option ${currentIsFoil && hasFoil ? 'active' : ''} ${!hasFoil ? 'disabled' : ''}" 
                 onclick="${hasFoil ? `setFoil(true)` : ''}">
              <div class="foil-option-label">✨ Foil</div>
              <div class="foil-option-price">${hasFoil ? (foilPrice > 0 ? '$' + foilPrice.toFixed(2) : '暂无价格') : '此版本无 Foil'}</div>
              ${currentIsFoil && hasFoil ? '<div style="color: var(--secondary); font-size: 0.75rem; margin-top: 0.25rem;">✅ 当前</div>' : ''}
            </div>
          </div>
        `;
      }

      grid.innerHTML = `
        ${foilOptions}
        ${versions.map(version => {
          const price = currentIsFoil 
            ? (parseFloat(version.prices?.usd_foil || '0') || 0)
            : (parseFloat(version.prices?.usd || '0') || 0);
          const isSelected = version.id === currentSelectedCard;
          const rarityMap = {
            'common': 'common',
            'uncommon': 'uncommon',
            'rare': 'rare',
            'mythic': 'mythic',
            'basic land': 'common'
          };
          const rarityClass = rarityMap[version.rarity] || 'common';
          const hasThisVersionFoil = version.foil;
          const hasThisVersionNonFoil = version.nonfoil;

          return `
            <div class="version-card ${isSelected ? 'selected' : ''}" onclick="selectVersion('${version.id}')">
              <img class="version-image" src="${version.image_uris?.normal || 'https://cards.scryfall.io/back.jpg'}" alt="${version.name}">
              <div class="version-set">${version.set_name} (${version.set.toUpperCase()})</div>
              <div class="version-rarity rarity-${rarityClass}">${version.rarity}</div>
              <div style="font-size: 0.625rem; color: var(--text-muted); margin: 0.25rem 0;">
                ${hasThisVersionFoil ? '✨ Foil' : ''}${hasThisVersionFoil && hasThisVersionNonFoil ? ' | ' : ''}${hasThisVersionNonFoil ? '⚪ Non-foil' : ''}
              </div>
              <div class="version-price">${price > 0 ? '$' + price.toFixed(2) : '暂无价格'}</div>
              ${isSelected ? '<div style="color: var(--secondary); font-size: 0.75rem; margin-top: 0.5rem;">✅ 当前版本</div>' : ''}
            </div>
          `;
        }).join('')}
      `;
    }

    // 选择版本
    async function selectVersion(newCardId) {
      if (newCardId === currentSelectedCard) {
        closeVersionModal();
        return;
      }

      try {
        // 获取新版本卡牌数据
        const response = await fetch(`https://api.scryfall.com/cards/${newCardId}`);
        const newCard = await response.json();

        if (newCard.object !== 'card') {
          showToast('获取卡牌失败', 'error');
          return;
        }

        // 更新卡组中的卡牌
        const targetDeck = currentSelectedArea === 'main' ? deck.main : deck.side;
        const cardIndex = targetDeck.findIndex(c => c.id === currentSelectedCard);
        
        if (cardIndex >= 0) {
          const oldCard = targetDeck[cardIndex];
          const price = parseFloat(newCard.prices?.usd || newCard.prices?.usd_foil || newCard.prices?.eur || '0') || 0;
          
          targetDeck[cardIndex] = {
            ...oldCard,
            id: newCard.id,
            name: newCard.name,
            image_uris: newCard.image_uris,
            price: price,
            set: newCard.set,
            set_name: newCard.set_name,
            collector_number: newCard.collector_number
          };

          updateDeckUI();
          saveDeck();
          showToast(`已切换到 ${newCard.set_name} 版本`, 'success');
          closeVersionModal();
        }
      } catch (error) {
        console.error('切换版本失败:', error);
        showToast('切换失败', 'error');
      }
    }

    // 关闭版本选择器
    function closeVersionModal() {
      document.getElementById('versionModal').style.display = 'none';
      currentSelectedCard = null;
      currentSelectedArea = null;
    }

    // 点击弹窗外部关闭版本选择器
    document.getElementById('versionModal').addEventListener('click', (e) => {
      if (e.target.id === 'versionModal') {
        closeVersionModal();
      }
    });

    // 切换 Foil/Non-foil
    function setFoil(isFoil) {
      const targetDeck = currentSelectedArea === 'main' ? deck.main : deck.side;
      const card = targetDeck.find(c => c.id === currentSelectedCard);
      
      if (!card) return;

      // 获取当前版本卡牌数据来检查是否有 Foil/Non-foil
      fetch(`https://api.scryfall.com/cards/${card.id}`)
        .then(res => res.json())
        .then(versionData => {
          const hasFoil = versionData.foil;
          const hasNonFoil = versionData.nonfoil;

          if ((isFoil && !hasFoil) || (!isFoil && !hasNonFoil)) {
            showToast(`此版本没有${isFoil ? 'Foil' : 'Non-foil'}`, 'error');
            return;
          }

          // 更新 foil 状态和价格
          card.foil = isFoil;
          const price = isFoil 
            ? (parseFloat(versionData.prices?.usd_foil || '0') || 0)
            : (parseFloat(versionData.prices?.usd || '0') || 0);
          card.price = price;

          updateDeckUI();
          saveDeck();
          showToast(`已切换到${isFoil ? ' Foil' : ' Non-foil'}`, 'success');
          
          // 重新显示版本列表以更新 UI
          fetch(`https://api.scryfall.com/cards/${currentSelectedCard}`)
            .then(res => res.json())
            .then(card => {
              if (card.prints_search_uri) {
                fetch(card.prints_search_uri)
                  .then(res => res.json())
                  .then(prints => displayVersions(prints.data || []));
              }
            });
        })
        .catch(err => {
          console.error('切换 Foil 失败:', err);
          showToast('切换失败', 'error');
        });
    }

    // 在卡组列表中切换 Foil
    function toggleFoil(cardId, area) {
      const targetDeck = area === 'main' ? deck.main : deck.side;
      const card = targetDeck.find(c => c.id === cardId);
      
      if (!card) return;

      // 切换 foil 状态
      card.foil = !card.foil;
      const isFoil = card.foil;

      // 获取价格
      fetch(`https://api.scryfall.com/cards/${cardId}`, { signal: AbortSignal.timeout(10000) })
        .then(res => res.json())
        .then(versionData => {
          const hasFoil = versionData.foil;
          const hasNonFoil = versionData.nonfoil;

          if ((isFoil && !hasFoil) || (!isFoil && !hasNonFoil)) {
            // 这个版本没有所需的类型，切换回来
            card.foil = !isFoil;
            showToast(`此版本没有${isFoil ? 'Foil' : 'Non-foil'}`, 'error');
            updateDeckUI();
            return;
          }

          const price = isFoil 
            ? (parseFloat(versionData.prices?.usd_foil || '0') || 0)
            : (parseFloat(versionData.prices?.usd || '0') || 0);
          card.price = price;

          updateDeckUI();
          saveDeck();
          showToast(`已切换到${isFoil ? ' Foil' : ' Non-foil'}`, 'success');
        })
        .catch(err => {
          console.error('切换 Foil 失败:', err);
          card.foil = !isFoil; // 恢复原状态
          updateDeckUI();
          showToast('切换失败', 'error');
        });
    }
  </script>
  <!-- 登录弹窗 -->
  <div class="auth-modal" id="authModal">
    <div class="auth-modal-content">
      <div class="auth-modal-tabs">
        <div class="auth-modal-tab active" onclick="switchAuthTab('login')">登录</div>
        <div class="auth-modal-tab" onclick="switchAuthTab('signup')">注册</div>
      </div>
      
      <div id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" placeholder="邮箱" required>
        <input type="password" id="loginPassword" placeholder="密码" required>
        <button onclick="handleLogin()">登录</button>
        <div id="loginMessage"></div>
      </div>
      
      <div id="signupForm" class="auth-form" style="display: none;">
        <input type="email" id="signupEmail" placeholder="邮箱" required>
        <input type="password" id="signupPassword" placeholder="密码（至少 6 位）" required>
        <button onclick="handleSignup()">注册</button>
        <div id="signupMessage"></div>
      </div>
      
      <button onclick="closeAuthModal()" style="margin-top: 1rem; background: none; border: none; color: var(--text-muted); cursor: pointer; width: 100%;">关闭</button>
    </div>
  </div>

  <script>
    // ============ 认证 UI ============
    
    let currentUser = null;
    
    // 确保函数在全局作用域
    window.openAuthModal = function() {
      const modal = document.getElementById('authModal');
      if (modal) {
        modal.style.display = 'flex';
      } else {
        console.error('Auth modal not found');
      }
    };
    
    window.closeAuthModal = function() {
      const modal = document.getElementById('authModal');
      if (modal) {
        modal.style.display = 'none';
      }
    };
    
    window.switchAuthTab = function(tab) {
      document.querySelectorAll('.auth-modal-tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      if (tab === 'login') {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('signupForm').style.display = 'none';
      } else {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('signupForm').style.display = 'block';
      }
    };
    
    window.handleLogin = async function() {
      // 重试机制：等待 mtgAuth 加载
      let retries = 0;
      while (!window.mtgAuth && retries < 10) {
        await new Promise(resolve => setTimeout(resolve, 100));
        retries++;
      }
      
      if (!window.mtgAuth) {
        const messageDiv = document.getElementById('loginMessage');
        messageDiv.className = 'auth-message error';
        messageDiv.textContent = 'Supabase 未初始化，请刷新页面';
        return;
      }
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const messageDiv = document.getElementById('loginMessage');
      
      if (!email || !password) {
        messageDiv.className = 'auth-message error';
        messageDiv.textContent = '请输入邮箱和密码';
        return;
      }
      
      const result = await mtgAuth.signIn(email, password);
      
      if (result.success) {
        messageDiv.className = 'auth-message success';
        messageDiv.textContent = '登录成功！';
        setTimeout(() => {
          closeAuthModal();
          messageDiv.textContent = '';
        }, 1000);
      } else {
        messageDiv.className = 'auth-message error';
        messageDiv.textContent = result.error;
      }
    };
    
    window.handleSignup = async function() {
      // 重试机制：等待 mtgAuth 加载
      let retries = 0;
      while (!window.mtgAuth && retries < 10) {
        await new Promise(resolve => setTimeout(resolve, 100));
        retries++;
      }
      
      if (!window.mtgAuth) {
        const messageDiv = document.getElementById('signupMessage');
        messageDiv.className = 'auth-message error';
        messageDiv.textContent = 'Supabase 未初始化，请刷新页面';
        return;
      }
      
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const messageDiv = document.getElementById('signupMessage');
      
      if (!email || !password) {
        messageDiv.className = 'auth-message error';
        messageDiv.textContent = '请输入邮箱和密码';
        return;
      }
      
      if (password.length < 6) {
        messageDiv.className = 'auth-message error';
        messageDiv.textContent = '密码至少 6 位';
        return;
      }
      
      const result = await mtgAuth.signUp(email, password);
      
      if (result.success) {
        messageDiv.className = 'auth-message success';
        messageDiv.textContent = '注册成功！请检查邮箱验证（如需要）';
        setTimeout(() => {
          closeAuthModal();
          messageDiv.textContent = '';
        }, 2000);
      } else {
        messageDiv.className = 'auth-message error';
        messageDiv.textContent = result.error;
      }
    };
    
    window.handleLogout = async function() {
      if (window.mtgAuth && confirm('确定要登出吗？')) {
        await mtgAuth.signOut();
        currentUser = null;
        updateAuthUI();
      }
    };
    
    // 初始化认证状态
    window.addEventListener('DOMContentLoaded', async () => {
      // 监听认证状态
      if (window.mtgAuth) {
        mtgAuth.onAuthStateChange((event, user) => {
          currentUser = user;
          updateAuthUI();
          
          if (user) {
            // 登录后自动加载云端卡组
            loadCloudDecks();
          }
        });
        
        // 检查是否已登录
        const user = await mtgAuth.getCurrentUser();
        currentUser = user;
        updateAuthUI();
      }
    });
    
    // 更新认证 UI
    function updateAuthUI() {
      const authContainer = document.querySelector('.auth-buttons');
      if (!authContainer) return;
      
      if (currentUser) {
        authContainer.innerHTML = `
          <div class="user-info">
            <span class="user-email">${currentUser.email}</span>
            <div class="sync-status synced" id="syncStatus">已同步</div>
          </div>
          <button class="auth-btn" onclick="openAuthModal()">☁️ 云端卡组</button>
          <button class="auth-btn" onclick="handleLogout()">登出</button>
        `;
      } else {
        authContainer.innerHTML = `
          <button class="auth-btn" onclick="openAuthModal()">🔐 登录/注册</button>
        `;
      }
    }
    
    // ============ 云端卡组管理 ============
    
    window.loadCloudDecks = async function() {
      if (!currentUser || !window.mtgAuth) return;
      
      console.log('🔍 正在加载云端卡组...');
      
      const result = await mtgAuth.loadDecks();
      
      if (result.success && result.decks.length > 0) {
        console.log('✅ 云端卡组:', result.decks);
        
        // 合并云端和本地卡组
        const savedDecks = getSavedDecks();
        
        result.decks.forEach(cloudDeck => {
          const name = cloudDeck.name;
          if (!savedDecks[name]) {
            // 云端卡组不在本地，添加到本地
            savedDecks[name] = {
              name: cloudDeck.name,
              main: cloudDeck.main_deck || [],
              side: cloudDeck.sideboard || [],
              updatedAt: cloudDeck.updated_at,
              fromCloud: true,
              cloudId: cloudDeck.id
            };
          }
        });
        
        localStorage.setItem('mtg-saved-decks', JSON.stringify(savedDecks));
        renderSavedDecks();
        
        showToast(`已同步 ${result.decks.length} 副云端卡组`, 'success');
      } else if (result.success) {
        console.log('ℹ️ 云端没有卡组');
      } else {
        console.error('❌ 加载云端卡组失败:', result.error);
      }
    };
    
    // 点击弹窗外部关闭
    const modalEl = document.getElementById('authModal');
    if (modalEl) {
      modalEl.addEventListener('click', (e) => {
        if (e.target.id === 'authModal') {
          closeAuthModal();
        }
      });
    }
    
    // 调试信息
    console.log('✅ 认证 UI 已初始化');
    console.log('mtgAuth:', window.mtgAuth ? '已加载' : '未加载');
    console.log('openAuthModal:', typeof window.openAuthModal);
    console.log('authModal 元素:', document.getElementById('authModal') ? '存在' : '不存在');
    
    // 测试：3 秒后自动打开登录窗口（仅用于调试）
    // setTimeout(() => {
    //   console.log('测试：尝试打开登录窗口');
    //   if (typeof window.openAuthModal === 'function') {
    //     window.openAuthModal();
    //   }
    // }, 3000);
  </script>
