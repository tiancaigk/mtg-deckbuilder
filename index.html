<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万智牌卡组构建器 | MTG Deck Builder</title>
  <link rel="stylesheet" href="css/main.css?v=202603052105">
  <meta name="description" content="万智牌卡组构建工具 - 支持中文搜索、云端保存、价格统计">
</head>
<body>
  <!-- 头部 -->
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <div class="logo-icon">🎴</div>
        <span>MTG Deck Builder</span>
      </div>
      <div class="deck-info">
        <button class="deck-manage-btn" onclick="window.mtgDeck.showDeckManager()" title="卡组管理">📁</button>
        <div class="deck-actions">
          <button class="action-btn" onclick="window.mtgDeck.clearDeck()" title="清空卡组">🗑️</button>
          <button class="action-btn" onclick="window.mtgDeck.showImportModal()" title="导入卡组">📥</button>
          <button class="action-btn export" onclick="window.mtgDeck.exportDeck()" title="导出卡组">📤</button>
        </div>
        <div class="auth-buttons">
          <button class="auth-btn" onclick="window.mtgAuthUI.openAuthModal()">🔐 登录/注册</button>
        </div>
      </div>
    </div>
  </header>

  <!-- 主容器 -->
  <main class="main-container">
    <!-- 左侧：搜索和结果 -->
    <div class="search-section">
      <div class="search-box">
        <input type="text" class="search-input" placeholder="搜索卡牌（英文或中文）..." id="searchInput">
        <button class="search-btn" onclick="window.mtgSearch.searchCards()">
          🔍 搜索
        </button>
      </div>
      <div class="search-options">
        <label class="checkbox-label">
          <input type="checkbox" id="chineseOnlyCheckbox">
          <span>只显示中文版</span>
        </label>
      </div>
      <div class="search-filters" id="colorFilters">
        <div class="filter-chip active" data-color="">
          <span>全部</span>
        </div>
        <div class="filter-chip" data-color="W">
          <div class="mana-filter mana-w">W</div>
        </div>
        <div class="filter-chip" data-color="U">
          <div class="mana-filter mana-u">U</div>
        </div>
        <div class="filter-chip" data-color="B">
          <div class="mana-filter mana-b">B</div>
        </div>
        <div class="filter-chip" data-color="R">
          <div class="mana-filter mana-r">R</div>
        </div>
        <div class="filter-chip" data-color="G">
          <div class="mana-filter mana-g">G</div>
        </div>
      </div>
      <div class="search-results" id="searchResults">
        <div class="empty-state">
          <div class="empty-state-icon">🔍</div>
          <div class="empty-state-text">搜索卡牌开始构建你的卡组</div>
        </div>
      </div>
    </div>

    <!-- 右侧：卡组面板 -->
    <aside class="deck-panel">
      <div class="panel-header">
        <div style="display: flex; align-items: center; gap: 1rem; flex: 1; min-width: 0;">
          <h2 class="panel-title" style="margin: 0;">我的卡组</h2>
          <span id="deckNameDisplay" style="font-size: 0.875rem; color: var(--text-muted); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></span>
          <div style="display: flex; gap: 1.5rem; margin-left: auto;">
            <div class="deck-stat" style="text-align: center;">
              <div class="deck-stat-value" id="mainCount">0</div>
              <div class="deck-stat-label">主牌</div>
            </div>
            <div class="deck-stat" style="text-align: center;">
              <div class="deck-stat-value" id="sideCount">0</div>
              <div class="deck-stat-label">备牌</div>
            </div>
            <div class="deck-stat" style="text-align: center;">
              <div class="deck-stat-value price" id="totalPrice">$0.00</div>
              <div class="deck-stat-label">总价</div>
            </div>
          </div>
        </div>
      </div>

      <!-- 主牌区 -->
      <div class="deck-area">
        <div class="deck-area-header" onclick="window.mtgDeck.toggleSection('mainDeckContent')">
          <div class="deck-area-title">
            ⚔️ 主牌 (Main Deck)
            <span class="deck-area-count" id="mainTotalCount">0</span>
          </div>
          <span class="deck-area-limit">最少 60 张</span>
        </div>
        <div class="deck-area-content" id="mainDeckContent">
          <div class="deck-section" id="mainCreaturesSection">
            <div class="section-header">
              <div class="section-title">⚔️ 生物</div>
              <div class="section-count" id="mainCreatureCount">0</div>
            </div>
            <div id="mainCreaturesList"></div>
          </div>

          <div class="deck-section" id="mainSpellsSection">
            <div class="section-header">
              <div class="section-title">✨ 咒语</div>
              <div class="section-count" id="mainSpellCount">0</div>
            </div>
            <div id="mainSpellsList"></div>
          </div>

          <div class="deck-section" id="mainLandsSection">
            <div class="section-header">
              <div class="section-title">🏔️ 地牌</div>
              <div class="section-count" id="mainLandCount">0</div>
            </div>
            <div id="mainLandsList"></div>
          </div>

          <div class="mana-curve">
            <div class="mana-curve-title">主牌法力曲线</div>
            <div class="curve-chart" id="mainManaCurve"></div>
          </div>

          <div class="mana-curve">
            <div class="mana-curve-title">主牌颜色分布</div>
            <div class="color-distribution" id="mainColorDistribution"></div>
          </div>
        </div>
      </div>

      <!-- 备牌区 -->
      <div class="deck-area">
        <div class="deck-area-header" onclick="window.mtgDeck.toggleSection('sideDeckContent')">
          <div class="deck-area-title">
            🔄 备牌 (Sideboard)
            <span class="deck-area-count" id="sideTotalCount">0</span>
          </div>
          <span class="deck-area-limit">最多 15 张</span>
        </div>
        <div class="deck-area-content" id="sideDeckContent">
          <div class="deck-section" id="sideCreaturesSection">
            <div class="section-header">
              <div class="section-title">⚔️ 生物</div>
              <div class="section-count" id="sideCreatureCount">0</div>
            </div>
            <div id="sideCreaturesList"></div>
          </div>

          <div class="deck-section" id="sideSpellsSection">
            <div class="section-header">
              <div class="section-title">✨ 咒语</div>
              <div class="section-count" id="sideSpellCount">0</div>
            </div>
            <div id="sideSpellsList"></div>
          </div>

          <div class="deck-section" id="sideLandsSection">
            <div class="section-header">
              <div class="section-title">🏔️ 地牌</div>
              <div class="section-count" id="sideLandCount">0</div>
            </div>
            <div id="sideLandsList"></div>
          </div>

          <div class="mana-curve">
            <div class="mana-curve-title">备牌颜色分布</div>
            <div class="color-distribution" id="sideColorDistribution"></div>
          </div>
        </div>
      </div>
    </aside>
  </main>

  <!-- 导入弹窗 -->
  <div class="modal-overlay" id="importModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">📥 导入卡组</h3>
        <button class="modal-close" onclick="window.mtgDeck.closeImportModal()">×</button>
      </div>
      
      <div style="margin-bottom: 0.5rem;">
        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">
          粘贴卡组列表（用 "Sideboard" 分隔主牌和备牌）
        </label>
      </div>

      <textarea class="import-textarea" id="importText" placeholder="4 Island
4 Steam Vents
3 Stormchaser's Talent
...

Sideboard
2 Disdainful Stroke
1 Flashfreeze
..."></textarea>

      <div class="import-status" id="importStatus">
        <div style="font-size: 0.875rem; color: var(--text-muted);">导入进度：</div>
        <div class="import-progress" id="importProgress"></div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="window.mtgDeck.closeImportModal()">取消</button>
        <button class="btn btn-primary" onclick="window.mtgDeck.importDeck()">导入卡组</button>
      </div>
    </div>
  </div>

  <!-- 版本选择弹窗 -->
  <div class="modal-overlay" id="versionModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" id="versionModalTitle">选择卡牌版本</h3>
        <button class="modal-close" onclick="window.mtgDeck.closeVersionModal()">×</button>
      </div>
      <div id="versionModalLoading" style="text-align: center; padding: 2rem;">
        <div class="spinner"></div>
        <div>加载中...</div>
      </div>
      <div class="versions-grid" id="versionsGrid"></div>
    </div>
  </div>

  <!-- 卡组管理弹窗 -->
  <div class="modal-overlay" id="deckManagerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">📁 卡组管理</h3>
        <button class="modal-close" onclick="window.mtgDeck.closeDeckManager()">×</button>
      </div>
      
      <div style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">
          当前卡组名称
        </label>
        <input type="text" class="deck-name-input" id="deckNameInput" placeholder="输入卡组名称..." style="width: 100%; margin-bottom: 1rem;">
        <button class="btn btn-primary" onclick="window.mtgDeck.saveCurrentDeck()" style="width: 100%;">💾 保存当前卡组</button>
      </div>

      <div style="margin-bottom: 1rem;">
        <label style="display: block; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">
          已保存的卡组（点击加载）
        </label>
        <div id="savedDecksList" style="max-height: 400px; overflow-y: auto;">
        </div>
      </div>
    </div>
  </div>

  <!-- 登录弹窗 -->
  <div class="auth-modal" id="authModal">
    <div class="auth-modal-content">
      <div class="auth-modal-tabs">
        <div class="auth-modal-tab active" onclick="window.mtgAuthUI.switchAuthTab('login')">登录</div>
        <div class="auth-modal-tab" onclick="window.mtgAuthUI.switchAuthTab('signup')">注册</div>
      </div>
      
      <div id="loginForm" class="auth-form">
        <input type="email" id="loginEmail" placeholder="邮箱" required>
        <input type="password" id="loginPassword" placeholder="密码" required>
        <button onclick="window.mtgAuthUI.handleLogin()">登录</button>
        <div id="loginMessage"></div>
      </div>
      
      <div id="signupForm" class="auth-form" style="display: none;">
        <input type="email" id="signupEmail" placeholder="邮箱" required>
        <input type="password" id="signupPassword" placeholder="密码（至少 6 位）" required>
        <button onclick="window.mtgAuthUI.handleSignup()">注册</button>
        <div id="signupMessage"></div>
      </div>
      
      <button onclick="window.mtgAuthUI.closeAuthModal()" style="margin-top: 1rem; background: none; border: none; color: var(--text-muted); cursor: pointer; width: 100%;">关闭</button>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=202603042233"></script>
  
  <!-- 模块脚本 -->
  <script src="js/utils.js"></script>
  <script src="js/deck.js"></script>
  <script src="js/search.js"></script>
  <script src="js/auth-ui.js"></script>
  
  <!-- 初始化 -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      window.mtgDeck.init();
      window.mtgSearch.setupColorFilters();
      window.mtgSearch.setupSearchEnterKey();
      window.mtgAuthUI.init();
    });
  </script>
</body>
</html>
